<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Users List</title>
        <link rel="stylesheet" href="bootstrap.min.css">
    </head>
    <body>
        <h1>Users List</h1>
        <div class="container-fluid row row-cols-2 row-cols-md-3 row-cols-sm-1">
            {% for user in users %}
                <div class="col mb-4 col-sm-6 col-md-6 col-lg-4 d-flex justify-content-center align-items-center">
                    <div style="width: max-content; height:100%; border-radius:5px; font-family:sans-serif; text-align:center; border:2px solid #888888; display:flex; flex-direction:column; justify-content:center; align-items:center;">
                        <div style="font-weight: bold; padding: 5px; color: #444444; font-size:0.9em;">
                            {{ user.first_name }} {{ user.last_name }}
                        </div>
                        <div style="padding: 5px; color: #888888; font-size:2em;">
                            {{ user.id }}
                        </div>
                        <div style="padding: 5px;">
                            {{ user.barcode | safe }}
                        </div>
                    </div>
                </div>
                </div>
                
            {% endfor %}
        </div>
    </body>
</html>
